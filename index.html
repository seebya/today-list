<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T O D A Y</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="paper-overlay"></div>
  <div class="fold"></div>

  <!-- Fixed top-left: your chosen icon, opens profile -->
  <button id="account-btn" class="account-btn" title="your profile"></button>

  <!-- Profile overlay — full page -->
  <div id="profile-overlay" class="profile-overlay hidden">
    <div class="paper">

      <section class="profile-section">
        <p class="section-label">your icon</p>
        <div class="icon-grid" id="icon-grid"></div>
      </section>

      <section class="profile-section">
        <div id="auth-form-area">
          <p class="section-label">save your list</p>
          <p class="auth-sub">enter your email. your current tasks will be saved and synced across devices.</p>
          <input type="email" id="auth-email-input" placeholder="your@email.com" autocomplete="email" />
          <button id="auth-send-btn">send magic link</button>
          <p id="auth-status"></p>
        </div>
        <div id="auth-user-area" class="hidden">
          <p class="section-label">account</p>
          <p id="auth-user-label"></p>
          <button id="auth-export-btn">export today</button>
          <button id="auth-signout-btn">sign out</button>
        </div>
      </section>

    </div>
  </div>

  <!-- Same icon, shown at top-left when profile is open — click to close -->
  <button id="profile-close" class="profile-close hidden"></button>

  <main class="paper">
    <header>
      <h1>T O D A Y</h1>
      <p id="date"></p>
    </header>

    <ul id="task-list"></ul>
    <input type="text" id="task-input" autocomplete="off" spellcheck="false" />
  </main>

  <div id="task-menu" class="task-menu hidden">
    <button id="menu-edit">edit</button>
    <button id="menu-delete">delete</button>
    <button id="menu-push">push to tomorrow</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://azitxesbwldyqfpqylby.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LishKGyfBaBZHyzs4uJ23Q_8rxWCq3a';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Local date — toISOString() is UTC and shows wrong day in UTC+ timezones
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    const todayStr     = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const tomorrowD    = new Date(d); tomorrowD.setDate(d.getDate() + 1);
    const tomorrowStr  = `${tomorrowD.getFullYear()}-${pad(tomorrowD.getMonth()+1)}-${pad(tomorrowD.getDate())}`;
    const yesterdayD   = new Date(d); yesterdayD.setDate(d.getDate() - 1);
    const yesterdayStr = `${yesterdayD.getFullYear()}-${pad(yesterdayD.getMonth()+1)}-${pad(yesterdayD.getDate())}`;

    function fmtDisplay(s) { return s.replace(/-/g, ' '); }
    document.getElementById('date').textContent = fmtDisplay(todayStr);

    // ── Icons — 10 circular line drawings, all 20×20 viewBox ─────────────────

    const ICON_INNER = [
      // 0: plain circle
      '',
      // 1: concentric circles
      '<circle cx="10" cy="10" r="4.5" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      // 2: square within circle
      '<rect x="5.5" y="5.5" width="9" height="9" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      // 3: triangle within circle (equilateral, inscribed)
      '<polygon points="10,1.5 17.36,14.25 2.64,14.25" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      // 4: diamond within circle (square rotated 45°, inscribed)
      '<polygon points="10,1.5 18.5,10 10,18.5 1.5,10" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      // 5: cross — edge to edge horizontal + vertical
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="1.5" y1="10" x2="18.5" y2="10" stroke="currentColor" stroke-width="1.2"/>',
      // 6: peace sign — vertical line + two arms from centre
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="5.75" y2="17.36" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="14.25" y2="17.36" stroke="currentColor" stroke-width="1.2"/>',
      // 7: 3-way spokes from centre (120° apart)
      '<line x1="10" y1="10" x2="10" y2="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="17.36" y2="14.25" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="2.64" y2="14.25" stroke="currentColor" stroke-width="1.2"/>',
      // 8: pie chart — one 120° sector outline
      '<path d="M10 10 L10 1.5 A8.5 8.5 0 0 1 17.36 14.25 Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/>',
      // 9: asterisk — 3 full diameters at 60° apart
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="17.36" y1="5.75" x2="2.64" y2="14.25" stroke="currentColor" stroke-width="1.2"/><line x1="2.64" y1="5.75" x2="17.36" y2="14.25" stroke="currentColor" stroke-width="1.2"/>',
    ];

    function renderIconSVG(index, size = 20) {
      const outer = '<circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.2" fill="none"/>';
      return `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">${outer}${ICON_INNER[index]}</svg>`;
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const input          = document.getElementById('task-input');
    const list           = document.getElementById('task-list');
    const fold           = document.querySelector('.fold');
    const headerTitle    = document.querySelector('header h1');
    const dateEl         = document.getElementById('date');
    const accountBtn     = document.getElementById('account-btn');
    const profileOverlay = document.getElementById('profile-overlay');
    const profileClose   = document.getElementById('profile-close');
    const iconGrid       = document.getElementById('icon-grid');
    const authFormArea   = document.getElementById('auth-form-area');
    const authUserArea   = document.getElementById('auth-user-area');
    const authStatus     = document.getElementById('auth-status');
    const authEmailInput = document.getElementById('auth-email-input');
    const authUserLabel  = document.getElementById('auth-user-label');

    // ── State ─────────────────────────────────────────────────────────────────

    let view             = 'today';
    let userId           = null;
    let currentUserEmail = null;
    let currentIconIndex = 0;
    let sortableInstance = null;
    let authInitialized  = false;

    // ── Icon UI ───────────────────────────────────────────────────────────────

    function updateIconButtons() {
      const svg = renderIconSVG(currentIconIndex);
      accountBtn.innerHTML   = svg;
      profileClose.innerHTML = svg;
    }

    function loadIconPref(session) {
      const meta = session?.user?.user_metadata?.icon;
      if (meta != null) return parseInt(meta);
      const stored = localStorage.getItem('today-list-icon');
      return stored != null ? parseInt(stored) : 0;
    }

    async function selectIcon(index) {
      currentIconIndex = index;
      updateIconButtons();
      buildIconGrid();
      localStorage.setItem('today-list-icon', index);
      if (userId && currentUserEmail) {
        await sb.auth.updateUser({ data: { icon: index } });
      }
    }

    function buildIconGrid() {
      iconGrid.innerHTML = '';
      ICON_INNER.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'icon-option' + (i === currentIconIndex ? ' selected' : '');
        btn.innerHTML = renderIconSVG(i, 26);
        btn.addEventListener('click', () => selectIcon(i));
        iconGrid.appendChild(btn);
      });
    }

    // ── Profile overlay ───────────────────────────────────────────────────────

    function showProfileOverlay() {
      profileOverlay.classList.remove('hidden');
      profileClose.classList.remove('hidden');
      buildIconGrid();
    }

    function hideProfileOverlay() {
      profileOverlay.classList.add('hidden');
      profileClose.classList.add('hidden');
    }

    function updateAccountUI(email) {
      currentUserEmail = email;
      if (email) {
        authFormArea.classList.add('hidden');
        authUserArea.classList.remove('hidden');
        authUserLabel.textContent = email;
      } else {
        authFormArea.classList.remove('hidden');
        authUserArea.classList.add('hidden');
        authStatus.textContent = '';
      }
    }

    accountBtn.addEventListener('click', showProfileOverlay);
    profileClose.addEventListener('click', hideProfileOverlay);

    // ── Auth actions ──────────────────────────────────────────────────────────

    document.getElementById('auth-send-btn').addEventListener('click', async () => {
      const email = authEmailInput.value.trim();
      if (!email) return;
      authStatus.textContent = 'sending...';

      // Save current tasks to localStorage so they transfer after sign-in redirect
      if (userId) {
        try {
          const { data: tasks } = await sb.from('tasks')
            .select('task_name, day, crossed_off, rolled_over, position')
            .eq('user_id', userId);
          if (tasks?.length) {
            localStorage.setItem('today-list-transfer', JSON.stringify({ tasks, ts: Date.now() }));
          }
        } catch (e) {}
      }

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: location.origin + location.pathname }
      });
      if (error) {
        authStatus.textContent = 'error — try again';
      } else {
        authStatus.textContent = 'check your inbox';
        authEmailInput.value = '';
      }
    });

    authEmailInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('auth-send-btn').click();
    });

    document.getElementById('auth-export-btn').addEventListener('click', () => {
      const items = [...list.querySelectorAll('.task-item')];
      const lines = [`T O D A Y — ${fmtDisplay(todayStr)}`, ''];
      items.forEach(li => {
        lines.push(`${li.classList.contains('crossed') ? '×' : '·'} ${li.querySelector('span').textContent}`);
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: `today-${todayStr}.txt` });
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    });

    document.getElementById('auth-signout-btn').addEventListener('click', async () => {
      authInitialized = false;
      await sb.auth.signOut();
      hideProfileOverlay();
      updateAccountUI(null);
      list.innerHTML = '';
      userId = null;
      await init();
    });

    // Handle magic-link callbacks — fires after authInitialized = true
    sb.auth.onAuthStateChange(async (event, session) => {
      if (!authInitialized) return;
      if (event === 'SIGNED_IN' && session?.user?.email) {
        await maybeTransferTasks(session.user.id);
        userId = session.user.id;
        currentIconIndex = loadIconPref(session);
        updateIconButtons();
        updateAccountUI(session.user.email);
        await renderToday();
        hideProfileOverlay();
      } else if (event === 'SIGNED_OUT') {
        userId = null;
        updateAccountUI(null);
      }
    });

    // ── Task transfer: anonymous → email account ───────────────────────────────

    async function maybeTransferTasks(newUserId) {
      const stored = localStorage.getItem('today-list-transfer');
      if (!stored) return;
      try {
        const { tasks, ts } = JSON.parse(stored);
        if (Date.now() - ts < 86400000 && tasks?.length) {
          const { data: existing } = await sb.from('tasks')
            .select('id').eq('user_id', newUserId).limit(1);
          if (!existing?.length) {
            const toInsert = tasks.map(({ id, user_id, created_at, ...rest }) =>
              ({ ...rest, user_id: newUserId })
            );
            await sb.from('tasks').insert(toInsert);
          }
        }
      } catch (e) {}
      localStorage.removeItem('today-list-transfer');
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      const { data: { session } } = await sb.auth.getSession();

      if (session) {
        userId = session.user.id;
        currentIconIndex = loadIconPref(session);
        updateIconButtons();
        updateAccountUI(session.user.email || null);
        if (session.user.email) await maybeTransferTasks(userId);
      } else {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error || !data?.session) {
          currentIconIndex = loadIconPref(null);
          updateIconButtons();
          authInitialized = true;
          showProfileOverlay();
          return;
        }
        userId = data.session.user.id;
        currentIconIndex = loadIconPref(null);
        updateIconButtons();
        updateAccountUI(null);
      }

      await sb.from('tasks')
        .update({ day: todayStr, rolled_over: true })
        .eq('user_id', userId)
        .eq('day', yesterdayStr)
        .eq('crossed_off', false);

      await renderToday();
      authInitialized = true;
    }

    // ── Render ────────────────────────────────────────────────────────────────

    async function renderToday() {
      view = 'today';
      headerTitle.textContent = 'T O D A Y';
      dateEl.textContent = fmtDisplay(todayStr);
      input.style.display = '';
      list.innerHTML = '';

      const { data: tasks } = await sb.from('tasks')
        .select('*')
        .eq('user_id', userId)
        .eq('day', todayStr)
        .order('position', { ascending: true })
        .order('rolled_over', { ascending: false })
        .order('created_at', { ascending: true });

      const loaded = tasks || [];
      if (loaded.some(t => t.position == null)) {
        await Promise.all(loaded.map((t, i) =>
          sb.from('tasks').update({ position: i }).eq('id', t.id)
        ));
      }
      loaded.forEach(task => list.appendChild(makeTask(task, 'today')));
      initSortable();
    }

    async function renderTomorrow() {
      view = 'tomorrow';
      headerTitle.textContent = 'T O M O R R O W';
      dateEl.textContent = fmtDisplay(tomorrowStr);
      input.style.display = 'none';
      list.innerHTML = '';

      const { data: tasks } = await sb.from('tasks')
        .select('*')
        .eq('user_id', userId)
        .eq('day', tomorrowStr)
        .order('position', { ascending: true })
        .order('created_at', { ascending: true });

      const loaded = tasks || [];
      if (loaded.some(t => t.position == null)) {
        await Promise.all(loaded.map((t, i) =>
          sb.from('tasks').update({ position: i }).eq('id', t.id)
        ));
      }
      loaded.forEach(task => list.appendChild(makeTask(task, 'tomorrow')));
      initSortable();
    }

    fold.addEventListener('click', () => {
      if (view === 'today') renderTomorrow();
      else renderToday();
    });

    function initSortable() {
      if (sortableInstance) sortableInstance.destroy();
      sortableInstance = Sortable.create(list, {
        animation: 150,
        ghostClass: 'task-ghost',
        chosenClass: 'task-chosen',
        delay: 200,
        delayOnTouchOnly: true,
        onEnd: saveOrder
      });
    }

    async function saveOrder() {
      const items = [...list.querySelectorAll('.task-item[data-id]')];
      await Promise.all(items.map((el, i) =>
        sb.from('tasks').update({ position: i }).eq('id', el.dataset.id)
      ));
    }

    // ── Task UI ───────────────────────────────────────────────────────────────

    function drawStrike(li, span, animate) {
      const liRect = li.getBoundingClientRect();
      const rects  = [...span.getClientRects()];
      const svg    = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
      rects.forEach((rect, i) => {
        const x1    = rect.left - liRect.left;
        const x2    = rect.right - liRect.left;
        const y     = rect.top - liRect.top + rect.height / 2;
        const tiltY = Math.random() * 6 - 3;
        const len   = x2 - x1;
        const line  = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y);
        line.setAttribute('x2', x2); line.setAttribute('y2', y + tiltY);
        line.setAttribute('stroke', '#1e451d'); line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-linecap', 'round');
        if (animate) {
          line.style.strokeDasharray  = len;
          line.style.strokeDashoffset = len;
          line.style.transition = `stroke-dashoffset 0.35s ease ${i * 0.08}s`;
        }
        svg.appendChild(line);
      });
      li.appendChild(svg);
      if (animate) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          svg.querySelectorAll('line').forEach(l => { l.style.strokeDashoffset = '0'; });
        }));
      }
    }

    function crossOff(li, task) {
      const span = li.querySelector('span');
      const nowCrossed = !li.classList.contains('crossed');
      sb.from('tasks').update({ crossed_off: nowCrossed }).eq('id', task.id);

      if (!nowCrossed) {
        li.classList.remove('crossed');
        const svg = li.querySelector('svg');
        if (svg) svg.remove();
        return;
      }

      li.classList.add('crossed');
      drawStrike(li, span, true);
    }

    function fadeOut(li, cb) {
      li.style.transition = 'opacity 200ms ease';
      li.style.opacity = '0';
      setTimeout(cb, 210);
    }

    function pushToTomorrow(li, task) {
      fadeOut(li, async () => {
        await sb.from('tasks').update({ day: tomorrowStr, rolled_over: false }).eq('id', task.id);
        li.remove();
      });
    }

    function pullToToday(li, task) {
      fadeOut(li, async () => {
        await sb.from('tasks').update({ day: todayStr }).eq('id', task.id);
        li.remove();
      });
    }

    function makeTask(task, context) {
      const li = document.createElement('li');
      li.className = 'task-item';
      li.dataset.id = task.id;
      if (task.crossed_off) li.classList.add('crossed');
      const span = document.createElement('span');
      span.textContent = task.task_name;
      li.appendChild(span);

      if (task.crossed_off) {
        requestAnimationFrame(() => drawStrike(li, span, false));
      }

      let touchStartX = 0, touchStartY = 0;
      li.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      li.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dy) > Math.abs(dx)) return;
        if (context === 'today') {
          if (dx < -50) crossOff(li, task);
          if (dx > 50) pushToTomorrow(li, task);
        } else {
          if (dx > 50) pullToToday(li, task);
        }
      });

      if (context === 'today') {
        li.addEventListener('click', () => crossOff(li, task));
      } else {
        li.addEventListener('click', () => pullToToday(li, task));
      }
      li.addEventListener('contextmenu', e => showTaskMenu(e, li, task, context));

      return li;
    }

    // ── Add task ──────────────────────────────────────────────────────────────

    input.addEventListener('keydown', async function(e) {
      if (e.key !== 'Enter') return;
      const text = input.value.trim();
      if (!text) return;
      if (!userId) { showProfileOverlay(); return; }

      input.value = '';

      const { data: inserted, error } = await sb.from('tasks')
        .insert({
          user_id: userId, task_name: text, crossed_off: false,
          day: todayStr, rolled_over: false,
          position: list.querySelectorAll('.task-item').length
        })
        .select().single();

      if (error) {
        console.error('insert error:', error);
        input.value = text;
        input.style.opacity = '0.4';
        setTimeout(() => { input.style.opacity = ''; }, 900);
        return;
      }
      if (inserted) list.appendChild(makeTask(inserted, 'today'));
    });

    // ── Context menu ──────────────────────────────────────────────────────────

    let menuTarget = null;
    const taskMenu = document.getElementById('task-menu');

    function showTaskMenu(e, li, task, context) {
      e.preventDefault();
      menuTarget = { li, task, context };
      document.getElementById('menu-push').textContent =
        context === 'today' ? 'push to tomorrow' : 'pull to today';
      taskMenu.classList.remove('hidden');
      let x = e.clientX, y = e.clientY;
      taskMenu.style.left = x + 'px';
      taskMenu.style.top  = y + 'px';
      requestAnimationFrame(() => {
        const r = taskMenu.getBoundingClientRect();
        if (r.right  > window.innerWidth)  taskMenu.style.left = (x - r.width)  + 'px';
        if (r.bottom > window.innerHeight) taskMenu.style.top  = (y - r.height) + 'px';
      });
    }

    function hideTaskMenu() {
      taskMenu.classList.add('hidden');
      menuTarget = null;
    }

    document.addEventListener('click', e => { if (!e.target.closest('#task-menu')) hideTaskMenu(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideTaskMenu(); });

    document.getElementById('menu-edit').addEventListener('click', () => {
      if (!menuTarget) return;
      const { li, task } = menuTarget;
      hideTaskMenu();
      startEdit(li, task);
    });

    document.getElementById('menu-delete').addEventListener('click', async () => {
      if (!menuTarget) return;
      const { li, task } = menuTarget;
      hideTaskMenu();
      fadeOut(li, async () => {
        await sb.from('tasks').delete().eq('id', task.id);
        li.remove();
      });
    });

    document.getElementById('menu-push').addEventListener('click', () => {
      if (!menuTarget) return;
      const { li, task, context } = menuTarget;
      hideTaskMenu();
      if (context === 'today') pushToTomorrow(li, task);
      else pullToToday(li, task);
    });

    function startEdit(li, task) {
      const wasCrossed = li.classList.contains('crossed');
      const span = li.querySelector('span');
      const svg  = li.querySelector('svg');
      if (svg) svg.remove();

      const original  = task.task_name;
      const editInput = document.createElement('input');
      editInput.type      = 'text';
      editInput.value     = original;
      editInput.className = 'task-edit-input';
      span.replaceWith(editInput);
      editInput.focus();
      editInput.select();

      let saved = false;

      function finish(newSpan) {
        if (editInput.parentNode) editInput.replaceWith(newSpan);
        if (wasCrossed) {
          li.classList.add('crossed');
          requestAnimationFrame(() => drawStrike(li, newSpan, false));
        }
      }

      async function saveEdit() {
        if (saved) return;
        saved = true;
        const newText = editInput.value.trim() || original;
        if (newText !== original) {
          await sb.from('tasks').update({ task_name: newText }).eq('id', task.id);
          task.task_name = newText;
        }
        const newSpan = document.createElement('span');
        newSpan.textContent = newText;
        finish(newSpan);
      }

      function cancelEdit() {
        if (saved) return;
        saved = true;
        const newSpan = document.createElement('span');
        newSpan.textContent = original;
        finish(newSpan);
      }

      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); saveEdit(); }
        if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
      });
      editInput.addEventListener('blur', saveEdit);
    }

    init();
  </script>
</body>
</html>
