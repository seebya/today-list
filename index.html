<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T O D A Y</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="paper-overlay"></div>

  <!-- Fixed top-left icon -->
  <button id="account-btn" class="account-btn" title="your profile"></button>

  <!-- Profile overlay -->
  <div id="profile-overlay" class="profile-overlay hidden">
    <div class="paper">
      <section class="profile-section">
        <p class="section-label">your icon</p>
        <div class="icon-grid" id="icon-grid"></div>
      </section>
      <section class="profile-section">
        <div id="auth-form-area">
          <p class="section-label">save your list</p>
          <p class="auth-sub">enter your email. your current tasks will be saved and synced across devices.</p>
          <input type="email" id="auth-email-input" placeholder="your@email.com" autocomplete="email" />
          <button id="auth-send-btn">send magic link</button>
          <p id="auth-status"></p>
        </div>
        <div id="auth-user-area" class="hidden">
          <p class="section-label">account</p>
          <p id="auth-user-label"></p>
          <button id="auth-signout-btn">sign out</button>
        </div>
      </section>
      <section class="profile-section">
        <p class="section-label">completed</p>
        <div id="history-list"></div>
      </section>
    </div>
  </div>

  <button id="profile-close" class="profile-close hidden"></button>

  <main class="paper">
    <header>
      <h1>T O D A Y</h1>
      <p id="date"></p>
    </header>

    <!-- Brain dump entry -->
    <button id="braindump-link" class="braindump-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <line x1="9" y1="21" x2="15" y2="21"/>
      </svg>
      brain dump
    </button>

    <!-- 4-quadrant board -->
    <div class="board-section">
      <div class="board-row">
        <div>
          <button class="quadrant-label ql-btn active-ql" data-q="easy-today">easy · today</button>
          <ul class="board-list" id="bl-easy-today"></ul>
        </div>
        <div>
          <button class="quadrant-label ql-btn" data-q="hard-today">hard · today</button>
          <ul class="board-list" id="bl-hard-today"></ul>
        </div>
      </div>

      <hr class="board-divider">

      <div class="board-row board-later">
        <div>
          <button class="quadrant-label ql-btn" data-q="easy-later">easy · later</button>
          <ul class="board-list" id="bl-easy-later"></ul>
        </div>
        <div>
          <button class="quadrant-label ql-btn" data-q="hard-later">hard · later</button>
          <ul class="board-list" id="bl-hard-later"></ul>
        </div>
      </div>
    </div>

    <!-- Plant pot -->
    <div class="plant-area">
      <div class="plant-wrap" id="plant-wrap">
        <div class="plant-growth" id="plant-growth"></div>
        <svg class="pot-svg" viewBox="0 0 44 22" width="44" height="22">
          <rect x="2" y="0" width="40" height="5" rx="2" stroke="#1e451d" stroke-width="1.2" fill="none"/>
          <path d="M6 5 L2 22 L42 22 L38 5" stroke="#1e451d" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
          <path d="M7 9 Q22 12 37 9" stroke="#1e451d" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
        </svg>
        <div class="seeds-badge hidden" id="seeds-badge"></div>
      </div>
    </div>

    <input type="text" id="task-input" placeholder="quick add → easy today" autocomplete="off" spellcheck="false" />
  </main>

  <!-- Brain dump overlay -->
  <div id="braindump-overlay" class="braindump-overlay hidden">
    <div class="paper">
      <div class="braindump-header">
        <button id="braindump-close" class="braindump-close">×</button>
      </div>

      <!-- Phase 1: chat -->
      <div id="bd-phase-input">
        <div id="bd-chat-messages" class="bd-chat-messages"></div>
        <p id="braindump-status" class="bd-chat-status"></p>
        <div class="bd-chat-input-row">
          <button id="bd-mic-btn" class="bd-mic-btn" title="tap to speak">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
              <line x1="9" y1="21" x2="15" y2="21"/>
            </svg>
          </button>
          <input id="bd-chat-input" class="bd-chat-input" type="text" placeholder="type or speak…" autocomplete="off" spellcheck="false" />
          <button id="bd-send-btn" class="bd-send-btn">→</button>
        </div>
      </div>

      <!-- Phase 2: review extracted tasks -->
      <div id="bd-phase-results" class="hidden">
        <p class="bd-review-label">tap badge to change · × to remove</p>
        <ul id="bd-review-list" class="bd-review-list"></ul>
        <div class="braindump-actions-row">
          <button id="bd-add-all-btn">add to board</button>
          <button id="bd-back-btn">back</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="task-menu" class="task-menu hidden">
    <button id="menu-edit">edit</button>
    <button id="menu-delete">delete</button>
    <div class="menu-divider"></div>
    <button id="menu-move-et">→ easy · today</button>
    <button id="menu-move-ht">→ hard · today</button>
    <button id="menu-move-el">→ easy · later</button>
    <button id="menu-move-hl">→ hard · later</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script>
    /*
     * MIGRATIONS — run once in Supabase SQL editor:
     * ALTER TABLE tasks ADD COLUMN IF NOT EXISTS quadrant TEXT;
     * ALTER TABLE tasks ADD COLUMN IF NOT EXISTS completed_at TIMESTAMPTZ;
     *
     * CREATE TABLE IF NOT EXISTS plants (
     *   id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
     *   user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
     *   species TEXT NOT NULL DEFAULT 'fern',
     *   stage INTEGER NOT NULL DEFAULT 0,
     *   water_count INTEGER NOT NULL DEFAULT 0,
     *   seeds_pending INTEGER NOT NULL DEFAULT 0,
     *   created_at TIMESTAMPTZ DEFAULT NOW(),
     *   is_collected BOOLEAN NOT NULL DEFAULT FALSE
     * );
     * ALTER TABLE plants ENABLE ROW LEVEL SECURITY;
     * CREATE POLICY "user owns plants" ON plants
     *   FOR ALL USING (auth.uid() = user_id);
     */

    function getPendingCrossed() {
      try { return new Set(JSON.parse(localStorage.getItem('today-list-crossed') || '[]')); }
      catch { return new Set(); }
    }
    function addPendingCrossed(id) {
      const s = getPendingCrossed(); s.add(id);
      localStorage.setItem('today-list-crossed', JSON.stringify([...s]));
    }
    function removePendingCrossed(id) {
      const s = getPendingCrossed(); s.delete(id);
      localStorage.setItem('today-list-crossed', JSON.stringify([...s]));
    }

    const SUPABASE_URL = 'https://azitxesbwldyqfpqylby.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LishKGyfBaBZHyzs4uJ23Q_8rxWCq3a';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    const todayStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    function fmtDisplay(s) { return s.replace(/-/g, ' '); }
    document.getElementById('date').textContent = fmtDisplay(todayStr);

    // ── Icons ─────────────────────────────────────────────────────────────────

    const ICON_INNER = [
      '',
      '<circle cx="10" cy="10" r="4.5" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      '<rect x="5.5" y="5.5" width="9" height="9" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      '<polygon points="10,1.5 17.36,14.25 2.64,14.25" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      '<polygon points="10,1.5 18.5,10 10,18.5 1.5,10" stroke="currentColor" stroke-width="1.2" fill="none"/>',
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="1.5" y1="10" x2="18.5" y2="10" stroke="currentColor" stroke-width="1.2"/>',
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="5.75" y2="17.36" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="14.25" y2="17.36" stroke="currentColor" stroke-width="1.2"/>',
      '<line x1="10" y1="10" x2="10" y2="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="17.36" y2="14.25" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="10" x2="2.64" y2="14.25" stroke="currentColor" stroke-width="1.2"/>',
      '<path d="M10 10 L10 1.5 A8.5 8.5 0 0 1 17.36 14.25 Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/>',
      '<line x1="10" y1="1.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/><line x1="17.36" y1="5.75" x2="2.64" y2="14.25" stroke="currentColor" stroke-width="1.2"/><line x1="2.64" y1="5.75" x2="17.36" y2="14.25" stroke="currentColor" stroke-width="1.2"/>',
    ];

    function renderIconSVG(index, size = 20) {
      const outer = '<circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.2" fill="none"/>';
      return `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">${outer}${ICON_INNER[index]}</svg>`;
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const taskInput      = document.getElementById('task-input');
    const braindumpLink  = document.getElementById('braindump-link');
    const accountBtn     = document.getElementById('account-btn');
    const profileOverlay = document.getElementById('profile-overlay');
    const profileClose   = document.getElementById('profile-close');
    const iconGrid       = document.getElementById('icon-grid');
    const authFormArea   = document.getElementById('auth-form-area');
    const authUserArea   = document.getElementById('auth-user-area');
    const authStatus     = document.getElementById('auth-status');
    const authEmailInput = document.getElementById('auth-email-input');
    const authUserLabel  = document.getElementById('auth-user-label');

    // ── State ─────────────────────────────────────────────────────────────────

    let userId           = null;
    let currentUserEmail = null;
    let currentIconIndex = 0;
    let authInitialized  = false;
    let activeQuadrant   = 'easy-today';

    // ── Plant state ───────────────────────────────────────────────────────────
    let plantData = null;
    const PLANT_SPECIES = ['fern', 'succulent', 'grass'];
    const WATERS_PER_STAGE = 3;

    const PLANT_SVGS = {
      fern: [
        `<svg viewBox="0 0 40 10" width="40" height="10"><ellipse cx="20" cy="6" rx="5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 24" width="40" height="24"><path d="M20 24 L20 10" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 13 Q26 9 28 13" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 36" width="40" height="36"><path d="M20 36 L20 4" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 10 Q28 5 27 12" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 10 Q12 5 13 12" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 20 Q28 16 27 22" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 20 Q12 16 13 22" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 48" width="40" height="48"><path d="M20 48 L20 2" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 8 Q29 3 28 10" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 8 Q11 3 12 10" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 18 Q29 13 28 20" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 18 Q11 13 12 20" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 28 Q28 24 27 30" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 28 Q12 24 13 30" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
      ],
      succulent: [
        `<svg viewBox="0 0 40 10" width="40" height="10"><ellipse cx="20" cy="6" rx="5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 24" width="40" height="24"><path d="M20 24 L20 14" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="20" cy="10" rx="5.5" ry="4" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 32" width="40" height="32"><path d="M20 32 L20 18" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="20" cy="12" rx="5" ry="4" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="11" cy="19" rx="4.5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="29" cy="19" rx="4.5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 44" width="40" height="44"><path d="M20 44 L20 28" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="20" cy="20" rx="5" ry="4" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="11" cy="27" rx="4.5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="29" cy="27" rx="4.5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="13" cy="14" rx="3.5" ry="3" stroke="#1e451d" stroke-width="1.2" fill="none"/><ellipse cx="27" cy="14" rx="3.5" ry="3" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
      ],
      grass: [
        `<svg viewBox="0 0 40 10" width="40" height="10"><ellipse cx="20" cy="6" rx="5" ry="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 32" width="40" height="32"><path d="M20 32 Q17 18 18 4" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 40" width="40" height="40"><path d="M16 40 Q12 24 12 6" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 40 Q20 22 20 4" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M24 40 Q28 24 28 6" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
        `<svg viewBox="0 0 40 52" width="40" height="52"><path d="M16 52 Q12 34 12 14" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M20 52 Q20 32 20 10" stroke="#1e451d" stroke-width="1.2" fill="none"/><path d="M24 52 Q28 34 28 14" stroke="#1e451d" stroke-width="1.2" fill="none"/><circle cx="12" cy="11" r="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/><circle cx="20" cy="7" r="4" stroke="#1e451d" stroke-width="1.2" fill="none"/><circle cx="28" cy="11" r="3.5" stroke="#1e451d" stroke-width="1.2" fill="none"/></svg>`,
      ],
    };

    function plantSVG(species, stage) {
      const s = PLANT_SVGS[species] || PLANT_SVGS.fern;
      return s[Math.min(stage, 3)] || s[0];
    }

    // ── Icon UI ───────────────────────────────────────────────────────────────

    function updateIconButtons() {
      const svg = renderIconSVG(currentIconIndex);
      accountBtn.innerHTML   = svg;
      profileClose.innerHTML = svg;
    }

    function loadIconPref(session) {
      const meta = session?.user?.user_metadata?.icon;
      if (meta != null) return parseInt(meta);
      const stored = localStorage.getItem('today-list-icon');
      return stored != null ? parseInt(stored) : 0;
    }

    async function selectIcon(index) {
      currentIconIndex = index;
      updateIconButtons();
      buildIconGrid();
      localStorage.setItem('today-list-icon', index);
      if (userId && currentUserEmail) {
        await sb.auth.updateUser({ data: { icon: index } });
      }
    }

    function buildIconGrid() {
      iconGrid.innerHTML = '';
      ICON_INNER.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'icon-option' + (i === currentIconIndex ? ' selected' : '');
        btn.innerHTML = renderIconSVG(i, 26);
        btn.addEventListener('click', () => selectIcon(i));
        iconGrid.appendChild(btn);
      });
    }

    // ── Profile overlay ───────────────────────────────────────────────────────

    function showProfileOverlay() {
      profileOverlay.classList.remove('hidden');
      profileClose.classList.remove('hidden');
      buildIconGrid();
      loadHistory();
    }

    function hideProfileOverlay() {
      profileOverlay.classList.add('hidden');
      profileClose.classList.add('hidden');
    }

    function updateAccountUI(email) {
      currentUserEmail = email;
      if (email) {
        authFormArea.classList.add('hidden');
        authUserArea.classList.remove('hidden');
        authUserLabel.textContent = email;
      } else {
        authFormArea.classList.remove('hidden');
        authUserArea.classList.add('hidden');
        authStatus.textContent = '';
      }
    }

    accountBtn.addEventListener('click', showProfileOverlay);
    profileClose.addEventListener('click', hideProfileOverlay);

    document.getElementById('auth-send-btn').addEventListener('click', async () => {
      const email = authEmailInput.value.trim();
      if (!email) return;
      authStatus.textContent = 'sending...';
      if (userId) {
        try {
          const { data: tasks } = await sb.from('tasks')
            .select('task_name, day, crossed_off, rolled_over, position, quadrant')
            .eq('user_id', userId);
          if (tasks?.length) {
            localStorage.setItem('today-list-transfer', JSON.stringify({ tasks, ts: Date.now() }));
          }
        } catch (e) {}
      }
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: location.origin + location.pathname }
      });
      if (error) {
        authStatus.textContent = 'error — try again';
      } else {
        authStatus.textContent = 'check your inbox';
        authEmailInput.value = '';
      }
    });

    authEmailInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('auth-send-btn').click();
    });

    document.getElementById('auth-signout-btn').addEventListener('click', async () => {
      authInitialized = false;
      await sb.auth.signOut();
      hideProfileOverlay();
      updateAccountUI(null);
      clearBoard();
      userId = null;
      await init();
    });

    sb.auth.onAuthStateChange(async (event, session) => {
      if (!authInitialized) return;
      if (event === 'SIGNED_IN' && session?.user?.email) {
        await maybeTransferTasks(session.user.id);
        userId = session.user.id;
        currentIconIndex = loadIconPref(session);
        updateIconButtons();
        updateAccountUI(session.user.email);
        await renderBoard();
        hideProfileOverlay();
      } else if (event === 'SIGNED_OUT') {
        userId = null;
        updateAccountUI(null);
      }
    });

    // ── Task transfer ─────────────────────────────────────────────────────────

    async function maybeTransferTasks(newUserId) {
      const stored = localStorage.getItem('today-list-transfer');
      if (!stored) return;
      try {
        const { tasks, ts } = JSON.parse(stored);
        if (Date.now() - ts < 86400000 && tasks?.length) {
          const { data: existing } = await sb.from('tasks')
            .select('id').eq('user_id', newUserId).limit(1);
          if (!existing?.length) {
            const toInsert = tasks.map(({ id, user_id, created_at, ...rest }) =>
              ({ ...rest, user_id: newUserId })
            );
            await sb.from('tasks').insert(toInsert);
          }
        }
      } catch (e) {}
      localStorage.removeItem('today-list-transfer');
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      const { data: { session } } = await sb.auth.getSession();

      if (session) {
        userId = session.user.id;
        currentIconIndex = loadIconPref(session);
        updateIconButtons();
        updateAccountUI(session.user.email || null);
        if (session.user.email) await maybeTransferTasks(userId);
      } else {
        const { data, error } = await sb.auth.signInAnonymously();
        if (error || !data?.session) {
          currentIconIndex = loadIconPref(null);
          updateIconButtons();
          authInitialized = true;
          showProfileOverlay();
          return;
        }
        userId = data.session.user.id;
        currentIconIndex = loadIconPref(null);
        updateIconButtons();
        updateAccountUI(null);
      }

      await renderBoard();
      await loadPlant();
      authInitialized = true;
    }

    // ── Board render ──────────────────────────────────────────────────────────

    function inferQuadrant() {
      return 'easy-today';
    }

    function clearBoard() {
      ['easy-today','hard-today','easy-later','hard-later'].forEach(q => {
        document.getElementById(`bl-${q}`).innerHTML = '';
      });
    }

    async function renderBoard() {
      clearBoard();

      const { data: tasks } = await sb.from('tasks')
        .select('*')
        .eq('user_id', userId)
        .eq('crossed_off', false)
        .order('position', { ascending: true })
        .order('created_at', { ascending: true });

      const crossedCache = getPendingCrossed();
      const loaded = (tasks || []).filter(t => !crossedCache.has(t.id));

      // One-time fix: first migration incorrectly set uncrossed tasks to easy-later
      if (!localStorage.getItem('q-fix-1')) {
        try {
          await sb.from('tasks')
            .update({ quadrant: 'easy-today' })
            .eq('user_id', userId)
            .eq('quadrant', 'easy-later')
            .eq('crossed_off', false);
          localStorage.setItem('q-fix-1', '1');
          loaded.filter(t => t.quadrant === 'easy-later' && !t.crossed_off)
                .forEach(t => { t.quadrant = 'easy-today'; });
        } catch (e) {}
      }

      // Backfill quadrant for old tasks that have none
      const needsQuadrant = loaded.filter(t => !t.quadrant);
      if (needsQuadrant.length) {
        for (const t of needsQuadrant) {
          t.quadrant = inferQuadrant(t);
        }
        try {
          await Promise.all(needsQuadrant.map(t =>
            sb.from('tasks').update({ quadrant: t.quadrant }).eq('id', t.id)
          ));
        } catch (e) {
          console.warn('quadrant column not found — run the SQL migration in Supabase');
        }
      }

      const buckets = { 'easy-today': [], 'hard-today': [], 'easy-later': [], 'hard-later': [] };
      loaded.forEach(t => {
        const q = t.quadrant || inferQuadrant(t);
        if (buckets[q]) buckets[q].push(t);
      });

      ['easy-today','hard-today','easy-later','hard-later'].forEach(q => {
        const ul = document.getElementById(`bl-${q}`);
        buckets[q].forEach(t => ul.appendChild(makeTask(t)));
      });

      initSortables();
    }

    function addTaskToBoard(task) {
      const q = task.quadrant || inferQuadrant(task);
      const ul = document.getElementById(`bl-${q}`);
      if (ul) ul.appendChild(makeTask(task));
    }

    function initSortables() {
      ['easy-today','hard-today','easy-later','hard-later'].forEach(q => {
        const ul = document.getElementById(`bl-${q}`);
        Sortable.create(ul, {
          animation: 150,
          ghostClass: 'task-ghost',
          chosenClass: 'task-chosen',
          delay: 200,
          delayOnTouchOnly: true,
          onEnd: () => {
            const items = [...ul.querySelectorAll('.task-item[data-id]')];
            Promise.all(items.map((el, i) =>
              sb.from('tasks').update({ position: i }).eq('id', el.dataset.id)
            ));
          }
        });
      });
    }

    // ── Task UI ───────────────────────────────────────────────────────────────

    function drawStrike(li, span, animate) {
      const liRect = li.getBoundingClientRect();
      const rects  = [...span.getClientRects()];
      const svg    = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
      rects.forEach((rect, i) => {
        const x1    = rect.left - liRect.left;
        const x2    = rect.right - liRect.left;
        const y     = rect.top - liRect.top + rect.height / 2;
        const tiltY = Math.random() * 6 - 3;
        const len   = x2 - x1;
        const line  = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y);
        line.setAttribute('x2', x2); line.setAttribute('y2', y + tiltY);
        line.setAttribute('stroke', '#1e451d'); line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-linecap', 'round');
        if (animate) {
          line.style.strokeDasharray  = len;
          line.style.strokeDashoffset = len;
          line.style.transition = `stroke-dashoffset 0.35s ease ${i * 0.08}s`;
        }
        svg.appendChild(line);
      });
      li.appendChild(svg);
      if (animate) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          svg.querySelectorAll('line').forEach(l => { l.style.strokeDashoffset = '0'; });
        }));
      }
    }

    function crossOff(li, task) {
      if (li.classList.contains('crossed')) return;
      const span = li.querySelector('span');
      const isHard = (task.quadrant || '').startsWith('hard');
      li.classList.add('crossed');
      drawStrike(li, span, true);

      // Write to localStorage immediately — survives Safari killing the page mid-fetch
      addPendingCrossed(task.id);

      sb.from('tasks').update({ crossed_off: true }).eq('id', task.id)
        .then(() => removePendingCrossed(task.id))
        .catch(() => {});
      sb.from('tasks').update({ completed_at: new Date().toISOString() }).eq('id', task.id).catch(() => {});

      setTimeout(() => fadeOut(li, () => li.remove()), 500);
      waterPlant(isHard);
    }

    function fadeOut(li, cb) {
      li.style.transition = 'opacity 200ms ease';
      li.style.opacity = '0';
      setTimeout(cb, 210);
    }

    async function moveToQuadrant(li, task, targetQ) {
      if (li.dataset.quadrant === targetQ) return;
      const targetUl = document.getElementById(`bl-${targetQ}`);
      if (!targetUl) return;

      li.style.transition = 'opacity 180ms ease';
      li.style.opacity = '0';
      setTimeout(async () => {
        await sb.from('tasks').update({ quadrant: targetQ }).eq('id', task.id);
        task.quadrant = targetQ;
        li.dataset.quadrant = targetQ;
        li.style.transition = 'opacity 180ms ease';
        li.style.opacity = '1';
        targetUl.appendChild(li);
      }, 190);
    }

    function makeTask(task) {
      const isHard = (task.quadrant || '').startsWith('hard');
      const li = document.createElement('li');
      li.className = 'task-item' + (isHard ? ' hard-task' : '');
      li.dataset.id = task.id;
      li.dataset.quadrant = task.quadrant || inferQuadrant(task);
      if (task.crossed_off) li.classList.add('crossed');

      const span = document.createElement('span');
      span.textContent = task.task_name;
      li.appendChild(span);

      if (task.crossed_off) {
        requestAnimationFrame(() => drawStrike(li, span, false));
      }

      li.addEventListener('click', () => crossOff(li, task));
      li.addEventListener('contextmenu', e => { e.preventDefault(); showTaskMenu(e, li, task); });

      // Long press for mobile
      let longPressTimer;
      li.addEventListener('touchstart', e => {
        longPressTimer = setTimeout(() => {
          const t = e.touches[0];
          showTaskMenu({ clientX: t.clientX, clientY: t.clientY, preventDefault: () => {} }, li, task);
        }, 500);
      }, { passive: true });
      li.addEventListener('touchend',  () => clearTimeout(longPressTimer), { passive: true });
      li.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });

      return li;
    }

    // ── Quick add ─────────────────────────────────────────────────────────────

    const QUADRANT_PLACEHOLDER = {
      'easy-today': 'quick add → easy today',
      'hard-today': 'quick add → hard today',
      'easy-later': 'quick add → easy later',
      'hard-later': 'quick add → hard later',
    };

    function setActiveQuadrant(q) {
      activeQuadrant = q;
      taskInput.placeholder = QUADRANT_PLACEHOLDER[q];
      document.querySelectorAll('.ql-btn').forEach(btn => {
        btn.classList.toggle('active-ql', btn.dataset.q === q);
      });
    }

    document.querySelectorAll('.ql-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveQuadrant(btn.dataset.q);
        taskInput.focus();
      });
    });

    taskInput.addEventListener('keydown', async function(e) {
      if (e.key !== 'Enter') return;
      const text = taskInput.value.trim();
      if (!text) return;
      if (!userId) { showProfileOverlay(); return; }

      taskInput.value = '';

      const ul = document.getElementById(`bl-${activeQuadrant}`);
      const { data: inserted, error } = await sb.from('tasks')
        .insert({
          user_id: userId, task_name: text, crossed_off: false,
          day: todayStr, rolled_over: false,
          quadrant: activeQuadrant,
          position: ul.querySelectorAll('.task-item').length
        })
        .select().single();

      if (error) {
        taskInput.value = text;
        taskInput.style.opacity = '0.4';
        setTimeout(() => { taskInput.style.opacity = ''; }, 900);
        return;
      }
      if (inserted) addTaskToBoard(inserted);
    });

    // ── Context menu ──────────────────────────────────────────────────────────

    let menuTarget = null;
    const taskMenu = document.getElementById('task-menu');

    function showTaskMenu(e, li, task) {
      menuTarget = { li, task };

      // Hide move option for current quadrant
      const curQ = li.dataset.quadrant;
      document.getElementById('menu-move-et').style.display = curQ === 'easy-today' ? 'none' : '';
      document.getElementById('menu-move-ht').style.display = curQ === 'hard-today' ? 'none' : '';
      document.getElementById('menu-move-el').style.display = curQ === 'easy-later' ? 'none' : '';
      document.getElementById('menu-move-hl').style.display = curQ === 'hard-later' ? 'none' : '';

      taskMenu.classList.remove('hidden');
      taskMenu.style.left = e.clientX + 'px';
      taskMenu.style.top  = e.clientY + 'px';
      requestAnimationFrame(() => {
        const r = taskMenu.getBoundingClientRect();
        if (r.right  > window.innerWidth)  taskMenu.style.left = (e.clientX - r.width)  + 'px';
        if (r.bottom > window.innerHeight) taskMenu.style.top  = (e.clientY - r.height) + 'px';
      });
    }

    function hideTaskMenu() {
      taskMenu.classList.add('hidden');
      menuTarget = null;
    }

    document.addEventListener('click', e => { if (!e.target.closest('#task-menu')) hideTaskMenu(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideTaskMenu(); });

    document.getElementById('menu-edit').addEventListener('click', () => {
      if (!menuTarget) return;
      const { li, task } = menuTarget;
      hideTaskMenu();
      startEdit(li, task);
    });

    document.getElementById('menu-delete').addEventListener('click', async () => {
      if (!menuTarget) return;
      const { li, task } = menuTarget;
      hideTaskMenu();
      fadeOut(li, async () => {
        await sb.from('tasks').delete().eq('id', task.id);
        li.remove();
      });
    });

    [
      ['menu-move-et', 'easy-today'],
      ['menu-move-ht', 'hard-today'],
      ['menu-move-el', 'easy-later'],
      ['menu-move-hl', 'hard-later'],
    ].forEach(([id, q]) => {
      document.getElementById(id).addEventListener('click', () => {
        if (!menuTarget) return;
        const { li, task } = menuTarget;
        hideTaskMenu();
        moveToQuadrant(li, task, q);
      });
    });

    function startEdit(li, task) {
      const wasCrossed = li.classList.contains('crossed');
      const span = li.querySelector('span');
      const svg  = li.querySelector('svg');
      if (svg) svg.remove();

      const original  = task.task_name;
      const editInput = document.createElement('input');
      editInput.type      = 'text';
      editInput.value     = original;
      editInput.className = 'task-edit-input';
      span.replaceWith(editInput);
      editInput.focus();
      editInput.select();

      let saved = false;

      function finish(newSpan) {
        if (editInput.parentNode) editInput.replaceWith(newSpan);
        if (wasCrossed) {
          li.classList.add('crossed');
          requestAnimationFrame(() => drawStrike(li, newSpan, false));
        }
      }

      async function saveEdit() {
        if (saved) return;
        saved = true;
        const newText = editInput.value.trim() || original;
        if (newText !== original) {
          await sb.from('tasks').update({ task_name: newText }).eq('id', task.id);
          task.task_name = newText;
        }
        const newSpan = document.createElement('span');
        newSpan.textContent = newText;
        finish(newSpan);
      }

      function cancelEdit() {
        if (saved) return;
        saved = true;
        const newSpan = document.createElement('span');
        newSpan.textContent = original;
        finish(newSpan);
      }

      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); saveEdit(); }
        if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
      });
      editInput.addEventListener('blur', saveEdit);
    }

    // ── Brain Dump (chat) ─────────────────────────────────────────────────────

    let bdExtracted  = [];
    let chatHistory  = [];
    let chatWaiting  = false;

    const braindumpOverlay = document.getElementById('braindump-overlay');
    const braindumpClose   = document.getElementById('braindump-close');
    const bdPhaseInput     = document.getElementById('bd-phase-input');
    const bdPhaseResults   = document.getElementById('bd-phase-results');
    const bdChatMessages   = document.getElementById('bd-chat-messages');
    const bdChatInput      = document.getElementById('bd-chat-input');
    const bdStatus         = document.getElementById('braindump-status');
    const bdMicBtn         = document.getElementById('bd-mic-btn');

    // ── Voice ─────────────────────────────────────────────────────────────────

    const hasSpeech = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    if (!hasSpeech) bdMicBtn.style.display = 'none';

    let recognition     = null;
    let isRecording     = false;
    let finalTranscript = '';

    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return false;
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
          else interim += e.results[i][0].transcript;
        }
        bdChatInput.value = (finalTranscript + interim).trim();
      };
      recognition.onend = () => { if (isRecording) try { recognition.start(); } catch(e) {} };
      recognition.onerror = e => { if (e.error !== 'no-speech') stopRecording(); };
      return true;
    }

    function startRecording() {
      if (!recognition && !initSpeech()) return;
      finalTranscript = bdChatInput.value;
      isRecording = true;
      try { recognition.start(); } catch(e) {}
      bdMicBtn.classList.add('recording');
    }

    function stopRecording() {
      isRecording = false;
      if (recognition) try { recognition.stop(); } catch(e) {}
      bdMicBtn.classList.remove('recording');
      // Auto-send if there's content
      const text = bdChatInput.value.trim();
      if (text) sendUserMessage(text);
    }

    bdMicBtn.addEventListener('click', () => {
      if (isRecording) stopRecording();
      else startRecording();
    });

    // ── Chat UI ───────────────────────────────────────────────────────────────

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = role === 'user' ? 'bd-msg bd-msg-user' : 'bd-msg bd-msg-bot';
      // Strip TASKS:[...] from displayed text
      div.textContent = text.replace(/TASKS:\s*\[[\s\S]*?\]/g, '').trim();
      bdChatMessages.appendChild(div);
      bdChatMessages.scrollTop = bdChatMessages.scrollHeight;
    }

    function setTyping(on) {
      bdStatus.textContent = on ? 'thinking…' : '';
      bdChatInput.disabled = on;
      chatWaiting = on;
    }

    function normalizeQ(raw) {
      if (!raw) return null;
      const s = String(raw).toLowerCase().replace(/[\s_]/g, '-');
      if (['easy-today','hard-today','easy-later','hard-later'].includes(s)) return s;
      const isHard = s.includes('hard'), isLater = s.includes('later');
      if (isHard && isLater) return 'hard-later';
      if (isHard)            return 'hard-today';
      if (isLater)           return 'easy-later';
      return 'easy-today';
    }

    function parseTasksFromReply(reply) {
      const match = reply.match(/TASKS:\s*(\[[\s\S]*?\])/);
      if (!match) return null;
      try {
        return JSON.parse(match[1])
          .map(item => ({
            task: (item.task || item.text || '').trim(),
            quadrant: normalizeQ(item.q || item.quadrant)
          }))
          .filter(i => i.task);
      } catch { return null; }
    }

    async function sendUserMessage(text) {
      if (!text || chatWaiting) return;
      bdChatInput.value = '';
      finalTranscript = '';
      appendMessage('user', text);
      chatHistory.push({ role: 'user', content: text });
      setTyping(true);

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_KEY}`,
          },
          body: JSON.stringify({ messages: chatHistory }),
        });
        const { reply } = await res.json();
        chatHistory.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);

        const tasks = parseTasksFromReply(reply);
        if (tasks?.length) {
          bdExtracted = tasks;
          setTimeout(() => {
            bdPhaseInput.classList.add('hidden');
            bdPhaseResults.classList.remove('hidden');
            renderReviewList();
          }, 600);
        }
      } catch(e) {
        appendMessage('assistant', 'Something went wrong — check your connection and try again.');
      }

      setTyping(false);
    }

    document.getElementById('bd-send-btn').addEventListener('click', () => {
      const text = bdChatInput.value.trim();
      if (text) sendUserMessage(text);
    });

    bdChatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); const t = bdChatInput.value.trim(); if (t) sendUserMessage(t); }
    });

    // ── Open / close ──────────────────────────────────────────────────────────

    function openBraindump() {
      braindumpOverlay.classList.remove('hidden');
      if (chatHistory.length === 0) {
        appendMessage('assistant', "What's on your mind? Speak or type — I'll help sort it out.");
      }
      setTimeout(() => bdChatInput.focus(), 50);
    }

    function closeBraindump() {
      stopRecording();
      braindumpOverlay.classList.add('hidden');
      bdPhaseResults.classList.add('hidden');
      bdPhaseInput.classList.remove('hidden');
      bdChatMessages.innerHTML = '';
      bdChatInput.value = '';
      bdStatus.textContent = '';
      chatHistory = [];
      bdExtracted = [];
      chatWaiting = false;
      document.getElementById('bd-review-list').innerHTML = '';
    }

    braindumpLink.addEventListener('click', openBraindump);
    braindumpClose.addEventListener('click', closeBraindump);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !braindumpOverlay.classList.contains('hidden')) closeBraindump();
    });

    // ── Review list ───────────────────────────────────────────────────────────

    const QUADRANT_LABELS = {
      'easy-today': 'easy · today',
      'hard-today': 'hard · today',
      'easy-later': 'easy · later',
      'hard-later': 'hard · later',
    };
    const QUADRANTS = ['easy-today','hard-today','easy-later','hard-later'];

    function renderReviewList() {
      const ul = document.getElementById('bd-review-list');
      ul.innerHTML = '';
      bdExtracted.forEach((item, idx) => {
        const li    = document.createElement('li');
        li.className = 'bd-review-item';

        const badge = document.createElement('button');
        badge.className = 'bd-quadrant-badge';
        badge.textContent = QUADRANT_LABELS[item.quadrant];
        badge.dataset.quadrant = item.quadrant;
        badge.addEventListener('click', () => {
          const cur = QUADRANTS.indexOf(item.quadrant);
          item.quadrant = QUADRANTS[(cur + 1) % QUADRANTS.length];
          badge.textContent = QUADRANT_LABELS[item.quadrant];
          badge.dataset.quadrant = item.quadrant;
        });

        const span = document.createElement('span');
        span.textContent = item.task;

        const rm = document.createElement('button');
        rm.className = 'bd-remove-btn';
        rm.textContent = '×';
        rm.addEventListener('click', () => { bdExtracted.splice(idx, 1); renderReviewList(); });

        li.appendChild(badge);
        li.appendChild(span);
        li.appendChild(rm);
        ul.appendChild(li);
      });
    }

    // ── Back button ───────────────────────────────────────────────────────────

    document.getElementById('bd-back-btn').addEventListener('click', () => {
      bdPhaseResults.classList.add('hidden');
      bdPhaseInput.classList.remove('hidden');
    });

    // ── Add all to board ──────────────────────────────────────────────────────

    document.getElementById('bd-add-all-btn').addEventListener('click', async () => {
      if (!bdExtracted.length) return;
      if (!userId) { showProfileOverlay(); return; }

      const btn = document.getElementById('bd-add-all-btn');
      btn.disabled = true;
      btn.textContent = 'adding…';

      const inserts = bdExtracted.map((item, i) => ({
        user_id: userId, task_name: item.task, quadrant: item.quadrant,
        crossed_off: false, day: todayStr, rolled_over: false, position: 9999 + i
      }));

      const { data: inserted, error } = await sb.from('tasks').insert(inserts).select();
      if (error) {
        btn.disabled = false;
        btn.textContent = 'add to board';
        bdStatus.textContent = 'error saving';
        return;
      }

      if (inserted) inserted.forEach(t => addTaskToBoard(t));
      closeBraindump();
    });

    // ── Plant system ─────────────────────────────────────────────────────────

    function renderPlant() {
      const growth = document.getElementById('plant-growth');
      const badge  = document.getElementById('seeds-badge');
      if (!growth) return;

      if (!plantData) {
        growth.innerHTML = '';
        badge.classList.add('hidden');
        return;
      }

      growth.innerHTML = plantSVG(plantData.species, plantData.stage);

      if (plantData.seeds_pending > 0) {
        badge.textContent = `+${plantData.seeds_pending}`;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    function animatePot(isHard, didGrow) {
      const wrap = document.getElementById('plant-wrap');
      if (!wrap) return;

      wrap.classList.add('pulsing');
      setTimeout(() => wrap.classList.remove('pulsing'), 420);

      const drop = document.createElement('div');
      drop.className = 'plant-droplet';
      drop.textContent = '·';
      wrap.appendChild(drop);
      setTimeout(() => drop.remove(), 650);

      if (isHard) {
        const float = document.createElement('div');
        float.className = 'plant-seed-float';
        float.textContent = '+seed';
        wrap.appendChild(float);
        setTimeout(() => float.remove(), 900);
      }

      if (didGrow) {
        const growth = document.getElementById('plant-growth');
        if (growth) {
          growth.classList.add('growing');
          setTimeout(() => growth.classList.remove('growing'), 550);
        }
      }
    }

    async function waterPlant(isHard) {
      if (!plantData || !userId) return;

      const newWater   = plantData.water_count + 1;
      const newStage   = Math.min(3, Math.floor(newWater / WATERS_PER_STAGE));
      const didGrow    = newStage > plantData.stage;
      const newSeeds   = plantData.seeds_pending + (isHard ? 1 : 0);

      plantData.water_count   = newWater;
      plantData.stage         = newStage;
      plantData.seeds_pending = newSeeds;

      animatePot(isHard, didGrow);
      renderPlant();

      try {
        await sb.from('plants')
          .update({ water_count: newWater, stage: newStage, seeds_pending: newSeeds })
          .eq('id', plantData.id);
      } catch (e) {}
    }

    async function loadPlant() {
      if (!userId) return;
      try {
        const { data } = await sb.from('plants')
          .select('*')
          .eq('user_id', userId)
          .eq('is_collected', false)
          .order('created_at', { ascending: false })
          .limit(1)
          .maybeSingle();

        if (data) {
          plantData = data;
        } else {
          const species = PLANT_SPECIES[Math.floor(Math.random() * PLANT_SPECIES.length)];
          const { data: newPlant } = await sb.from('plants')
            .insert({ user_id: userId, species, stage: 0, water_count: 0, seeds_pending: 0, is_collected: false })
            .select().single();
          if (newPlant) plantData = newPlant;
        }
        renderPlant();
      } catch (e) {
        console.warn('plants table not found — run the SQL migration');
      }
    }

    // ── History ───────────────────────────────────────────────────────────────

    async function loadHistory() {
      const historyList = document.getElementById('history-list');
      if (!userId) { historyList.innerHTML = ''; return; }
      historyList.innerHTML = '<p class="history-empty">loading…</p>';

      const { data: tasks } = await sb.from('tasks')
        .select('task_name, day, completed_at')
        .eq('user_id', userId)
        .eq('crossed_off', true)
        .order('completed_at', { ascending: false, nullsFirst: false })
        .order('day', { ascending: false })
        .limit(200);

      if (!tasks?.length) {
        historyList.innerHTML = '<p class="history-empty">nothing yet</p>';
        return;
      }

      const groups = {};
      tasks.forEach(t => {
        const date = t.completed_at ? t.completed_at.slice(0, 10) : (t.day || 'unknown');
        if (!groups[date]) groups[date] = [];
        groups[date].push(t.task_name);
      });

      historyList.innerHTML = '';
      Object.entries(groups).sort(([a], [b]) => b.localeCompare(a)).forEach(([date, names]) => {
        const dateEl = document.createElement('p');
        dateEl.className = 'history-date';
        dateEl.textContent = fmtDisplay(date);
        historyList.appendChild(dateEl);
        names.forEach(name => {
          const item = document.createElement('p');
          item.className = 'history-item';
          item.textContent = name;
          historyList.appendChild(item);
        });
      });
    }

    init();
  </script>
</body>
</html>
